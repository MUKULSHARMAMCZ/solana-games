<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Meme Mayhem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <div id="start-screen" class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-purple-900 to-black">
        <h1 class="text-6xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-pink-500">SOLANA</h1>
        <h1 class="text-6xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-400">MEME MAYHEM</h1>
        <button onclick="startGame()" class="px-10 py-4 bg-yellow-400 text-black text-2xl font-bold rounded-xl hover:scale-110 transition">PLAY NOW</button>
        <p class="mt-8 text-xl">Choose your meme champion</p>
    </div>

    <div id="game-screen" class="hidden flex flex-col h-screen">
        <canvas id="game" class="mx-auto mt-4 border-4 border-yellow-400 rounded-2xl" width="800" height="400"></canvas>
        <div class="flex justify-between px-8 py-3 bg-zinc-900 text-sm">
            <div>Score: <span id="score" class="text-yellow-400">0</span></div>
            <div>High Score: <span id="highscore" class="text-pink-400">0</span></div>
            <div id="character-name" class="text-cyan-400">Pepe</div>
        </div>
    </div>

    <script>
        // Full game code goes here - simplified endless runner
        let canvas, ctx;
        let player, gravity, velocity, isJumping;
        let score = 0;
        let gameRunning = false;
        let obstacles = [];
        let collectibles = [];

        const characters = {
            pepe: { name: '🐸 Pepe', color: '#22c55e', speed: 1 },
            myro: { name: '🐶 Myro', color: '#a78bfa', speed: 1.1 },
            fartcoin: { name: '💨 Fartcoin', color: '#eab308', speed: 1.3 },
            buttcoin: { name: '🍑 Buttcoin', color: '#ec4899', speed: 1 },
            troll: { name: '😈 Troll', color: '#f43f5e', speed: 1.2 }
        };

        let currentCharacter = 'pepe';

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initGame();
        }

        function initGame() {
            canvas = document.getElementById('game');
            ctx = canvas.getContext('2d');
            score = 0;
            obstacles = [];
            collectibles = [];
            player = { x: 100, y: 250, width: 50, height: 50, vy: 0 };
            gravity = 0.8;
            velocity = 0;
            isJumping = false;
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(0, 300, canvas.width, 100);

            // Player
            ctx.fillStyle = characters[currentCharacter].color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Simple jump physics
            player.vy += gravity;
            player.y += player.vy;

            if (player.y > 250) {
                player.y = 250;
                player.vy = 0;
                isJumping = false;
            }

            // Score
            score += 1;
            document.getElementById('score').textContent = Math.floor(score / 5);

            // Controls
            document.addEventListener('keydown', e => {
                if ((e.key === ' ' || e.key === 'ArrowUp') && !isJumping) {
                    player.vy = -18;
                    isJumping = true;
                }
            });

            requestAnimationFrame(gameLoop);
        }

        alert('Game loaded! Click anywhere on canvas and press SPACE or UP to jump. More features coming soon!');
    </script>
</body>
</html>
