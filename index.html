<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Meme Mayhem</title>
    <style>
        body { margin:0; background:#0a0a2a; font-family: 'Comic Sans MS', cursive; color:white; overflow:hidden; }
        canvas { display:block; margin:0 auto; image-rendering:pixelated; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .title { font-size:3rem; text-align:center; margin-top:20px; text-shadow: 0 0 20px #00ff00; }
        button { pointer-events:auto; padding:15px 30px; font-size:1.3rem; background:#ff00aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 0 20px #ff00aa; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="400"></canvas>
    <div id="ui">
        <h1 class="title" id="title">SOLANA MEME MAYHEM</h1>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let gameState = 'start'; // start, playing, gameover

        // Characters
        const characters = [
            {name: 'Pepe', emoji: '🐸', color: '#00ff00'},
            {name: 'Myro', emoji: '🐶', color: '#ff8800'},
            {name: 'Fartcoin', emoji: '💨', color: '#aa00ff'},
            {name: 'Buttcoin', emoji: '🍑', color: '#ff00aa'},
            {name: 'Troll', emoji: '😈', color: '#ffff00'},
            {name: 'Bonk', emoji: '🔨', color: '#ff0000'}
        ];

        let player = { x: 100, y: 250, vy: 0, emoji: '🐸', color: '#00ff00' };
        let score = 0;
        let speed = 4;
        let obstacles = [];
        let coins = [];
        let frame = 0;

        function drawBackground() {
            ctx.fillStyle = '#0a0a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Neon ground
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(0, 300, canvas.width, 100);
            
            // Grid lines
            ctx.strokeStyle = 'rgba(0,255,100,0.2)';
            for(let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(i*50 - (frame*2 % 50), 0);
                ctx.lineTo(i*50 - (frame*2 % 50), canvas.height);
                ctx.stroke();
            }
        }

        function update() {
            frame++;
            score += 1;
            
            // Gravity
            player.vy += 0.8;
            player.y += player.vy;
            
            if (player.y > 250) {
                player.y = 250;
                player.vy = 0;
            }

            // Spawn obstacles and coins
            if (frame % 45 === 0) {
                obstacles.push({x: canvas.width, y: 250, width: 40, height: 50});
            }
            if (frame % 25 === 0) {
                coins.push({x: canvas.width, y: 150 + Math.random()*100});
            }

            // Move obstacles
            for (let i = obstacles.length-1; i >= 0; i--) {
                obstacles[i].x -= speed;
                if (obstacles[i].x < -50) obstacles.splice(i,1);
            }

            // Move coins
            for (let i = coins.length-1; i >= 0; i--) {
                coins[i].x -= speed;
                if (coins[i].x < -50) coins.splice(i,1);
            }
        }

        function draw() {
            drawBackground();

            // Draw player
            ctx.font = '60px Arial';
            ctx.fillStyle = player.color;
            ctx.fillText(player.emoji, player.x, player.y + 60);

            // Draw obstacles
            ctx.fillStyle = '#ff0000';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#ffff00';
                ctx.fillText('💀', obs.x + 5, obs.y + 45);
                ctx.fillStyle = '#ff0000';
            }

            // Draw coins
            ctx.fillStyle = '#ffff00';
            for (let coin of coins) {
                ctx.fillText('💎', coin.x, coin.y);
            }

            // Score
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.fillText('Score: ' + Math.floor(score/5), 20, 50);
        }

        function gameLoop() {
            if (gameState === 'playing') {
                update();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // Controls
        document.addEventListener('keydown', e => {
            if ((e.key === ' ' || e.key === 'Space') && player.y >= 250 && gameState === 'playing') {
                player.vy = -18;
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState === 'start') {
                gameState = 'playing';
                document.getElementById('title').style.display = 'none';
                player.emoji = characters[Math.floor(Math.random()*characters.length)].emoji;
                player.color = '#00ffcc';
            } else if (gameState === 'playing' && player.y >= 250) {
                player.vy = -18;
            }
        });

        // Start the game
        gameLoop();

        // Instructions
        console.log('%c🚀 Solana Meme Mayhem deployed! Click to start. Press SPACE or tap to jump!', 'color:#00ff88; font-size:18px');
    </script>
</body>
</html>
